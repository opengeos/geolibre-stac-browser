<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GeoLibre STAC Browser - Basic Example</title>
  <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@5.24.0/dist/maplibre-gl.css">
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    #app {
      display: flex;
      width: 100vw;
      height: 100vh;
    }
    #sidebar {
      width: 380px;
      height: 100%;
      flex: 0 0 380px;
      border-right: 1px solid #e5e7eb;
      overflow: hidden;
    }
    #map {
      flex: 1 1 auto;
      height: 100%;
    }
    @media (max-width: 700px) {
      #app { flex-direction: column; }
      #sidebar { width: 100%; flex-basis: 50%; border-right: none; border-bottom: 1px solid #e5e7eb; }
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="sidebar"></div>
    <div id="map"></div>
  </div>
  <script type="module" src="./main.ts"></script>
</body>
</html>
